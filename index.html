  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #080614;

      --primary: #7C3AED;
      --cyan: #22D3EE;

    }
    html, body {

    body::after {

    }

    /* タイトル */

      align-items: center; justify-content: center;

    }
    .title-eyebrow { font-size: 12px; letter-spacing: 3px; color: var(--cyan); font-weight: bold; margin-bottom: 24px; }
    .title-h1 {
      font-size: clamp(30px, 9vw, 52px); font-weight: 900; line-height: 1.2; margin-bottom: 20px;
      background: linear-gradient(135deg, #fff 20%, var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .title-hook { font-size: 18px; color: var(--muted); line-height: 1.9; margin-bottom: 48px; }
    .title-hook strong { color: var(--text); }
    .title-emoji { font-size: 72px; margin-bottom: 32px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    .btn-start {
      padding: 20px 56px; background: linear-gradient(135deg, var(--primary), #9333EA);
      color: #fff; font-size: 18px; font-weight: bold; border: none; border-radius: 99px;
      cursor: pointer; box-shadow: 0 8px 32px rgba(124,58,237,0.5);
      transition: transform 0.1s; -webkit-tap-highlight-color: transparent;
    }
    .btn-start:active { transform: scale(0.96); }

    /* ノベル */
    #s-novel { display: none; min-height: 100vh; }
    .novel-header {
      position: sticky; top: 0; z-index: 10;
      background: rgba(8,6,20,0.92); backdrop-filter: blur(10px);
      padding: 12px 20px; display: flex; align-items: center; gap: 12px;

    .chapter-bar { flex: 1; height: 3px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
    .chapter-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--cyan)); border-radius: 3px; transition: width 0.6s ease; }
    .chapter-label { font-size: 11px; color: var(--muted); white-space: nowrap; font-weight: bold; }

    .scene-wrap {
      padding: 36px 24px 24px; min-height: calc(100vh - 60px);
      display: flex; flex-direction: column; cursor: pointer;
    }
    .scene-icon { font-size: 52px; text-align: center; margin-bottom: 24px; }
    .scene-chapter { font-size: 11px; font-weight: bold; letter-spacing: 2px; color: var(--cyan); margin-bottom: 16px; }
    .scene-text { font-size: 17px; line-height: 2.1; flex: 1; }
    .scene-text .em  { color: var(--gold); font-weight: bold; }
    .scene-text .hi  { color: var(--cyan); font-weight: bold; }
    .scene-text .gr  { color: var(--green); font-weight: bold; }
    .scene-text .rd  { color: var(--red); font-weight: bold; }
    .scene-text .lg  { font-size: 22px; font-weight: 900; line-height: 1.5; }

    .typewriter-cursor::after { content: '▊'; animation: blink 0.7s infinite; color: var(--cyan); margin-left: 2px; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .tap-hint { text-align: center; font-size: 13px; color: var(--muted); padding: 24px 0 0; animation: fadepulse 1.8s infinite; }
    @keyframes fadepulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

    /* 選択肢 */
    .choices-wrap { padding: 36px 24px 32px; }
    .choices-title { font-size: 20px; font-weight: 800; line-height: 1.4; margin-bottom: 28px; color: var(--text); }
    .choice-btn {
      display: block; width: 100%; padding: 20px 20px;
      background: var(--surface); border: 2px solid rgba(255,255,255,0.08);
      border-radius: 16px; color: var(--text); font-size: 15px; font-weight: 600;
      text-align: left; cursor: pointer; margin-bottom: 12px; line-height: 1.6;
      transition: border-color 0.2s, background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:active { transform: scale(0.98); }
    .choice-btn:hover { border-color: var(--primary); background: rgba(124,58,237,0.12); }

    /* エンディング */
    .ending-wrap { padding: 36px 24px 48px; text-align: center; }
    .ending-icon { font-size: 80px; margin-bottom: 20px; animation: float 2s ease-in-out infinite; }

      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;

    .ending-sub { font-size: 16px; color: var(--muted); line-height: 1.9; margin-bottom: 32px; }
    .ending-sub strong { color: var(--text); }
    .price-box {

      border: 1px solid rgba(124,58,237,0.5); border-radius: 20px;

    .price-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .price-num { font-size: 48px; font-weight: 900; color: var(--gold); line-height: 1; }
    .price-cross { font-size: 14px; color: var(--muted); text-decoration: line-through; margin-bottom: 6px; }
    .price-note { font-size: 13px; color: var(--muted); margin-top: 10px; line-height: 1.7; }
    .btn-cta {
      display: block; width: 100%; padding: 22px 24px;
      background: linear-gradient(135deg, var(--gold), #F97316);
      color: #fff; font-size: 20px; font-weight: 900;
      border: none; border-radius: 14px; cursor: pointer;

// ============================================================
// エンジン
// ============================================================
let branch = null;
let queue = [];
let qi = 0;
let typing = false;
let fullText = '';
let afterDone = null;

function startNovel() {
  document.getElementById('s-title').style.display = 'none';
  document.getElementById('s-novel').style.display = 'block';
  runQueue(COMMON_INTRO, null);
}

function runQueue(scenes, callback) {
  queue = scenes;
  qi = 0;
  afterDone = callback;
  next();
}

function next() {
  if (qi >= queue.length) { if (afterDone) afterDone(); return; }
  const s = queue[qi];
  setProgress(s.progress || 0);
  if (s.type === 'scene')  renderScene(s);
  else if (s.type === 'choice') renderChoice(s);
}

function setProgress(p) {
  document.getElementById('progress-bar').style.width = p + '%';
  const m = queue[qi]?.chapter?.match(/CHAPTER (\d+)/);
  if (m) document.getElementById('chapter-label').textContent = 'Ch.' + m[1];
}

function renderScene(s) {
  const c = document.getElementById('scene-container');
  c.innerHTML = `
    <div class="scene-wrap" onclick="tapScene()">
      <div class="scene-icon">${s.icon}</div>
      <div class="scene-chapter">${s.chapter}</div>
      <div class="scene-text typewriter-cursor" id="stext"></div>
      <div class="tap-hint" id="taph" style="display:none">タップして続ける ▼</div>
    </div>`;
  fullText = s.text;
  typeText(s.text);
}

function typeText(raw) {
  typing = true;
  const el = document.getElementById('stext');
  const encoded = raw
    .replace(/<em>([\s\S]*?)<\/em>/g, '⟨e⟩$1⟨/e⟩')
    .replace(/<hi>([\s\S]*?)<\/hi>/g, '⟨h⟩$1⟨/h⟩')
    .replace(/<gr>([\s\S]*?)<\/gr>/g, '⟨g⟩$1⟨/g⟩')
    .replace(/<rd>([\s\S]*?)<\/rd>/g, '⟨r⟩$1⟨/r⟩')
    .replace(/<lg>([\s\S]*?)<\/lg>/g, '⟨l⟩$1⟨/l⟩');
  const chars = [...encoded];
  let buf = ''; let i = 0;

  const decode = t => t
    .replace(/⟨e⟩([\s\S]*?)⟨\/e⟩/g,'<span class="em">$1</span>')
    .replace(/⟨h⟩([\s\S]*?)⟨\/h⟩/g,'<span class="hi">$1</span>')
    .replace(/⟨g⟩([\s\S]*?)⟨\/g⟩/g,'<span class="gr">$1</span>')
    .replace(/⟨r⟩([\s\S]*?)⟨\/r⟩/g,'<span class="rd">$1</span>')
    .replace(/⟨l⟩([\s\S]*?)⟨\/l⟩/g,'<span class="lg">$1</span>')
    .replace(/\n/g,'<br>');

  const t = setInterval(() => {
    if (i >= chars.length) {
      clearInterval(t);
      typing = false;
      el.classList.remove('typewriter-cursor');
      document.getElementById('taph').style.display = 'block';
      return;
    }
    buf += chars[i++];
    el.innerHTML = decode(buf);
  }, 26);
}

function showFull() {
  typing = false;
  const el = document.getElementById('stext');
  el.classList.remove('typewriter-cursor');
  const decode = t => t
    .replace(/<em>([\s\S]*?)<\/em>/g,'<span class="em">$1</span>')
    .replace(/<hi>([\s\S]*?)<\/hi>/g,'<span class="hi">$1</span>')
    .replace(/<gr>([\s\S]*?)<\/gr>/g,'<span class="gr">$1</span>')
    .replace(/<rd>([\s\S]*?)<\/rd>/g,'<span class="rd">$1</span>')
    .replace(/<lg>([\s\S]*?)<\/lg>/g,'<span class="lg">$1</span>')
    .replace(/\n/g,'<br>');
  el.innerHTML = decode(fullText);
  document.getElementById('taph').style.display = 'block';
}

function tapScene() {
  if (typing) { showFull(); return; }
  qi++;
  next();
}

function renderChoice(s) {
  setProgress(s.progress || 17);
  document.getElementById('scene-container').innerHTML = `
    <div class="choices-wrap">
      <div class="choices-title">${s.question.replace(/\n/g,'<br>')}</div>
      ${s.choices.map(c=>`<button class="choice-btn" onclick="pick('${c.key}')">${c.label}</button>`).join('')}
    </div>`;
  document.getElementById('chapter-label').textContent = 'Q';
}

function pick(key) {
  branch = key;
  const b = BRANCH[key] || [];
  runQueue([...b, ...COMMON_RENTON], () => {
    const e = ENDING[branch];
    runQueue(e.scenes, () => showEnding(e));
  });
}

function showEnding(e) {
  setProgress(100);
  document.getElementById('chapter-label').textContent = 'END';
  document.getElementById('scene-container').innerHTML = `
    <div class="ending-wrap">
      <div class="ending-icon">${e.endIcon}</div>
      <h2 class="ending-h2">${e.endTitle}</h2>
      <p class="ending-sub">${e.endSub.replace(/\n/g,'<br>')}</p>
      <div class="price-box">
        <div class="price-label">月額</div>
        <div><span class="price-num">3,980</span><span style="font-size:16px;color:var(--muted);margin-left:4px;">円</span></div>
        <div class="price-note">週1ゼミ・無制限質問・月刊テーマ・仲間<br>全部入りで、コーヒー1杯/日以下</div>
      </div>
      <a href="${RAML_URL}" class="btn-cta">🌊 RAMLの仲間になる</a>
      <div class="share-row">
        <button class="btn-share" onclick="shareX()">𝕏 シェア</button>
        <button class="btn-share" onclick="restart()">🔄 もう一度</button>
      </div>
      <p class="footer">Renton AI Movie Lab（RAML）<br>AIの波に、仲間と一緒に乗ろう。</p>
    </div>`;
}

function shareX() {
  const t = encodeURIComponent('RAMLに出会ったら3ヶ月後どうなるか体験した🌊\nAI動画・画像生成を仲間と学べるコミュニティ！\n#RAML #AI動画 #AI副業');
  window.open('https://twitter.com/intent/tweet?text='+t,'_blank');
}

function restart() {
  branch=null; queue=[]; qi=0; typing=false; afterDone=null;
  document.getElementById('s-novel').style.display='none';
  document.getElementById('s-title').style.display='flex';
}
</script>
</body>
</html>
