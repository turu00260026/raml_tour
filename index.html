<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>あなたの3ヶ月後の物語｜RAML</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #080614;
      --surface: #120E24;
      --surface2: #1C1635;
      --primary: #7C3AED;
      --cyan: #22D3EE;
      --gold: #FBBF24;
      --green: #34D399;
      --text: #F0EEFF;
      --muted: #8B85A8;
    }
    html, body {
      background: var(--bg);
      min-height: 100vh;
      font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 10% 10%, rgba(124,58,237,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 90%, rgba(34,211,238,0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 0 0 80px;
    }

    /* ======= タイトル ======= */
    #s-title {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .title-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(124,58,237,0.5);
      border-radius: 99px;
      padding: 5px 16px;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 2px;
      color: var(--cyan);
      margin-bottom: 32px;
    }
    .title-emoji { font-size: 80px; margin-bottom: 28px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .title-h1 {
      font-size: clamp(28px, 8vw, 44px);
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #fff 20%, var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .title-desc { font-size: 15px; color: var(--muted); line-height: 1.8; margin-bottom: 48px; }
    .btn-start {
      padding: 18px 48px;
      background: linear-gradient(135deg, var(--primary), #9333EA);
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 99px;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(124,58,237,0.5);
      transition: transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-start:active { transform: scale(0.96); }

    /* ======= ノベル画面 ======= */
    #s-novel { display: none; min-height: 100vh; }

    .novel-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(8,6,20,0.9);
      backdrop-filter: blur(8px);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chapter-bar { flex: 1; height: 3px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
    .chapter-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--cyan)); border-radius: 3px; transition: width 0.5s; }
    .chapter-label { font-size: 11px; color: var(--muted); white-space: nowrap; }

    .scene-wrap {
      padding: 32px 24px 24px;
      min-height: calc(100vh - 60px);
      display: flex;
      flex-direction: column;
    }

    .scene-icon { font-size: 56px; text-align: center; margin-bottom: 24px; }
    .scene-chapter {
      font-size: 11px; font-weight: bold; letter-spacing: 2px;
      color: var(--cyan); margin-bottom: 12px;
    }
    .scene-text {
      font-size: 16px; line-height: 2; flex: 1;
      white-space: pre-wrap;
    }
    .scene-text .em { color: var(--gold); font-weight: bold; }
    .scene-text .hi { color: var(--cyan); font-weight: bold; }
    .scene-text .gr { color: var(--green); font-weight: bold; }

    /* タイプライター */
    .typewriter::after {
      content: '▊';
      animation: blink 0.7s infinite;
      color: var(--cyan);
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .tap-hint {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      padding: 20px 0 0;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

    /* 選択肢 */
    .choices-wrap { padding: 0 24px 32px; }
    .choices-title { font-size: 14px; color: var(--muted); margin-bottom: 16px; text-align: center; }
    .choice-btn {
      display: block; width: 100%;
      padding: 18px 20px;
      background: var(--surface);
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      color: var(--text);
      font-size: 15px; font-weight: 600;
      text-align: left; cursor: pointer;
      margin-bottom: 12px;
      line-height: 1.5;
      transition: border-color 0.2s, background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:active { transform: scale(0.98); }
    .choice-btn:hover { border-color: var(--primary); background: rgba(124,58,237,0.1); }

    /* エンディング */
    .ending-wrap { padding: 24px; text-align: center; }
    .ending-icon { font-size: 72px; margin-bottom: 20px; animation: float 2s ease-in-out infinite; }
    .ending-h2 {
      font-size: clamp(22px, 6vw, 32px); font-weight: 900;
      line-height: 1.3; margin-bottom: 12px;
      background: linear-gradient(135deg, var(--gold), #F97316);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .ending-sub { font-size: 15px; color: var(--muted); line-height: 1.8; margin-bottom: 32px; }
    .price-box {
      background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(34,211,238,0.15));
      border: 1px solid rgba(124,58,237,0.4);
      border-radius: 20px;
      padding: 24px; margin-bottom: 20px;
      text-align: center;
    }
    .price-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .price-num { font-size: 44px; font-weight: 900; color: var(--gold); line-height: 1; }
    .price-note { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.6; }
    .btn-cta {
      display: block; width: 100%;
      padding: 20px 24px;
      background: linear-gradient(135deg, var(--gold), #F97316);
      color: #fff; font-size: 20px; font-weight: 900;
      border: none; border-radius: 14px; cursor: pointer;
      box-shadow: 0 6px 32px rgba(245,158,11,0.4);
      transition: transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      text-decoration: none; text-align: center;
    }
    .btn-cta:active { transform: scale(0.97); }
    .share-row { display: flex; gap: 10px; margin-top: 10px; }
    .btn-share {
      flex: 1; padding: 12px;
      background: var(--surface); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; color: var(--text); font-size: 13px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .footer { font-size: 11px; color: var(--muted); text-align: center; margin-top: 20px; line-height: 1.8; }
  </style>
</head>

// ===== エンジン =====
let currentBranch = null;
let sceneQueue = [];
let sceneIndex = 0;
let isTyping = false;
let currentFullText = '';

function startNovel() {
  document.getElementById('s-title').style.display = 'none';
  document.getElementById('s-novel').style.display = 'block';
  buildQueue(COMMON_INTRO);
  renderNext();
}

function buildQueue(scenes) {
  sceneQueue = scenes;
  sceneIndex = 0;
}

function setProgress(pct) {
  document.getElementById('progress-bar').style.width = pct + '%';
}

function renderNext() {
  if (sceneIndex >= sceneQueue.length) return;
  const scene = sceneQueue[sceneIndex];
  setProgress(scene.progress || 0);

  if (scene.type === 'scene') {
    renderScene(scene);
  } else if (scene.type === 'choice') {
    renderChoice(scene);
  } else if (scene.type === 'ending') {
    renderEnding(scene);
  }
}

function renderScene(scene) {
  const container = document.getElementById('scene-container');
  container.innerHTML = `
    <div class="scene-wrap" id="current-scene" onclick="onSceneTap()">
      <div class="scene-icon">${scene.icon}</div>
      <div class="scene-chapter">${scene.chapter}</div>
      <div class="scene-text typewriter" id="scene-text"></div>
      <div class="tap-hint" id="tap-hint" style="display:none;">タップして続ける ▼</div>
    </div>
  `;

  // chapterラベル更新
  const ch = scene.chapter.match(/CHAPTER (\d+)/);
  if (ch) document.getElementById('chapter-label').textContent = `Ch.${ch[1]}`;

  currentFullText = scene.text;
  typeText(scene.text);
}

function typeText(text) {
  isTyping = true;
  const el = document.getElementById('scene-text');
  let i = 0;
  let display = '';

  // HTMLタグ処理
  const parsed = text.replace(/<em>(.*?)<\/em>/g, (_, t) => `⟨em⟩${t}⟨/em⟩`)
                     .replace(/<hi>(.*?)<\/hi>/g, (_, t) => `⟨hi⟩${t}⟨/hi⟩`)
                     .replace(/<gr>(.*?)<\/gr>/g, (_, t) => `⟨gr⟩${t}⟨/gr⟩`);
  const chars = [...parsed];

  const timer = setInterval(() => {
    if (i >= chars.length) {
      clearInterval(timer);
      isTyping = false;
      el.classList.remove('typewriter');
      document.getElementById('tap-hint').style.display = 'block';
      return;
    }
    display += chars[i];
    i++;
    el.innerHTML = display
      .replace(/⟨em⟩(.*?)⟨\/em⟩/g, '<span class="em">$1</span>')
      .replace(/⟨hi⟩(.*?)⟨\/hi⟩/g, '<span class="hi">$1</span>')
      .replace(/⟨gr⟩(.*?)⟨\/gr⟩/g, '<span class="gr">$1</span>')
      .replace(/\n/g, '<br>');
  }, 28);
}

function onSceneTap() {
  if (isTyping) {
    // 全部表示
    isTyping = false;
    const el = document.getElementById('scene-text');
    el.classList.remove('typewriter');
    el.innerHTML = currentFullText
      .replace(/<em>(.*?)<\/em>/g, '<span class="em">$1</span>')
      .replace(/<hi>(.*?)<\/hi>/g, '<span class="hi">$1</span>')
      .replace(/<gr>(.*?)<\/gr>/g, '<span class="gr">$1</span>')
      .replace(/\n/g, '<br>');
    document.getElementById('tap-hint').style.display = 'block';
    return;
  }
  // 次へ
  sceneIndex++;
  if (sceneIndex < sceneQueue.length) {
    renderNext();
  } else {
    // キュー終了後の処理
    afterQueue();
  }
}

let afterQueueCallback = null;

function afterQueue() {
  if (afterQueueCallback) afterQueueCallback();
}

function renderChoice(scene) {
  setProgress(scene.progress || 15);
  const container = document.getElementById('scene-container');
  container.innerHTML = `
    <div class="choices-wrap" style="padding-top:40px;">
      <div class="choices-title" style="font-size:18px;font-weight:800;color:#fff;margin-bottom:24px;line-height:1.4;">${scene.question}</div>
      ${scene.choices.map(c => `
        <button class="choice-btn" onclick="choicePicked('${c.key}')">
          ${c.label}
        </button>
      `).join('')}
    </div>
  `;
}

function choicePicked(key) {
  currentBranch = key;
  const branchScenes = BRANCH[key] || [];
  sceneQueue = [...branchScenes, ...COMMON_RENTON];
  sceneIndex = 0;

  afterQueueCallback = () => {
    // レントン→共通が終わったらエンディングシーンへ
    const ending = ENDING[currentBranch];
    sceneQueue = [...ending.scenes];
    sceneIndex = 0;
    afterQueueCallback = () => showEnding(ending);
    renderNext();
  };

  renderNext();
}

function showEnding(ending) {
  const container = document.getElementById('scene-container');
  setProgress(100);
  document.getElementById('chapter-label').textContent = 'END';
  container.innerHTML = `
    <div class="ending-wrap">
      <div class="ending-icon">${ending.endIcon}</div>
      <h2 class="ending-h2">${ending.endTitle}</h2>
      <p class="ending-sub">${ending.endSub.replace(/\n/g,'<br>')}</p>
      <div class="price-box">
        <div class="price-label">月額</div>
        <div><span class="price-num">3,980</span><span style="font-size:16px;color:var(--muted);margin-left:4px;">円</span></div>
        <div class="price-note">週1ゼミ・無制限質問・月刊テーマ・仲間<br>全部込みで、コーヒー1杯分/日以下</div>
      </div>
      <a href="${RAML_URL}" class="btn-cta">🌊 RAMLの仲間になる</a>
      <div class="share-row">
        <button class="btn-share" onclick="shareX()">𝕏 シェア</button>
        <button class="btn-share" onclick="restart()">🔄 もう一度</button>
      </div>
      <p class="footer">Renton AI Movie Lab（RAML）<br>AIの波に、仲間と一緒に乗ろう。</p>
    </div>
  `;
}

function shareX() {
  const text = encodeURIComponent('RAMLに出会ったら3ヶ月後どうなるか体験した🌊\nAI動画・画像生成を仲間と学べるコミュニティが気になってる！\n#RAML #AI動画 #AIスキル');
  window.open('https://twitter.com/intent/tweet?text=' + text, '_blank');
}

function restart() {
  currentBranch = null;
  sceneQueue = [];
  sceneIndex = 0;
  afterQueueCallback = null;
  document.getElementById('s-novel').style.display = 'none';
  document.getElementById('s-title').style.display = 'flex';
}
</script>
</body>
</html>
